<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <!-- Fonts and style -->
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=JetBrains+Mono:wght@700&family=Inter:wght@400;500;600&display=swap');
      .title-text {
        font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
        font-weight: 800;
      }
      .body-text {
        font-family: 'Inter', -apple-system, sans-serif;
        font-weight: 500;
      }
      .mono-text {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
      }
    ]]></style>

    <!-- Filters -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5" />
    </filter>
    <filter id="glow-dot" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-play" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Gradients -->
    <radialGradient id="bg-glow" cx="75%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#162235" />
      <stop offset="60%" stop-color="#0f141c" />
      <stop offset="100%" stop-color="#0d1117" />
    </radialGradient>

    <linearGradient id="grad-morph" x1="848" y1="0" x2="1150" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2f81f7" stop-opacity="0.1" />
      <stop offset="20%" stop-color="#2f81f7" stop-opacity="0.75" />
      <stop offset="70%" stop-color="#3fb950" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0.95" />
    </linearGradient>

    <linearGradient id="grad-morph-stroke" x1="848" y1="0" x2="1150" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2f81f7" stop-opacity="0.2" />
      <stop offset="40%" stop-color="#2f81f7" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0.9" />
    </linearGradient>

    <linearGradient id="grad-bar-blue-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f81f7" />
      <stop offset="100%" stop-color="#2ba8b4" />
    </linearGradient>
    <linearGradient id="grad-bar-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ba8b4" />
      <stop offset="100%" stop-color="#35b383" />
    </linearGradient>
    <linearGradient id="grad-bar-teal-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#35b383" />
      <stop offset="100%" stop-color="#3fb950" />
    </linearGradient>
    <linearGradient id="grad-bar-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fb950" />
      <stop offset="100%" stop-color="#2b7c37" />
    </linearGradient>

    <linearGradient id="grad-title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2f81f7" />
      <stop offset="100%" stop-color="#3fb950" />
    </linearGradient>

    <linearGradient id="grad-play-stroke" x1="920" y1="80" x2="1060" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2f81f7" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0.05" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#8b949e" opacity="0.08" />
    </pattern>

    <!-- Mask for film sprocket holes -->
    <mask id="film-mask">
      <rect x="0" y="0" width="1280" height="320" fill="#ffffff" />
      <!-- Top Sprocket Holes -->
      <rect x="945" y="80" width="12" height="16" rx="3" fill="#000000" />
      <rect x="975" y="80" width="12" height="16" rx="3" fill="#000000" />
      <rect x="1005" y="80" width="12" height="16" rx="3" fill="#000000" />
      <rect x="1035" y="80" width="12" height="16" rx="3" fill="#000000" />
      <rect x="1065" y="80" width="12" height="16" rx="3" fill="#000000" />
      <rect x="1095" y="80" width="12" height="16" rx="3" fill="#000000" />
      <rect x="1125" y="80" width="12" height="16" rx="3" fill="#000000" />
      <!-- Bottom Sprocket Holes -->
      <rect x="945" y="224" width="12" height="16" rx="3" fill="#000000" />
      <rect x="975" y="224" width="12" height="16" rx="3" fill="#000000" />
      <rect x="1005" y="224" width="12" height="16" rx="3" fill="#000000" />
      <rect x="1035" y="224" width="12" height="16" rx="3" fill="#000000" />
      <rect x="1065" y="224" width="12" height="16" rx="3" fill="#000000" />
      <rect x="1095" y="224" width="12" height="16" rx="3" fill="#000000" />
      <rect x="1125" y="224" width="12" height="16" rx="3" fill="#000000" />
    </mask>
  </defs>

  <!-- Background Base & Spotlight -->
  <rect width="1280" height="320" fill="url(#bg-glow)" />

  <!-- Grid Pattern Overlay -->
  <rect width="1280" height="320" fill="url(#grid)" />

  <!-- Soft Decorative Background Waves (Left) -->
  <path d="M -50,120 C 150,140 220,70 380,100" fill="none" stroke="#2f81f7" stroke-width="1.5" opacity="0.08" />
  <path d="M -50,230 C 180,210 210,260 410,220" fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.06" />

  <!-- Large Glowing Background Play Triangle -->
  <polygon points="915,75 915,245 1060,160" fill="none" stroke="url(#grad-play-stroke)" stroke-width="2.5" opacity="0.25" filter="url(#glow-play)" />

  <!-- Small Transitional Play Triangle behind bars -->
  <polygon points="860,130 910,160 860,190" fill="#f0f6fc" fill-opacity="0.05" stroke="#2f81f7" stroke-width="1.5" stroke-opacity="0.3" stroke-linejoin="round" />

  <!-- Morphing Ribbon / Film Strip Body -->
  <path d="M 848,160 C 865,160 880,115 895,95 C 910,75 920,70 935,70 L 1150,70 L 1150,250 L 935,250 C 920,250 910,245 895,225 C 880,205 865,160 848,160 Z" 
        fill="url(#grad-morph)" stroke="url(#grad-morph-stroke)" stroke-width="2" mask="url(#film-mask)" filter="url(#shadow)" />

  <!-- Film Frame Divider Lines -->
  <line x1="1000" y1="70" x2="1000" y2="250" stroke="#f0f6fc" stroke-width="1.5" opacity="0.12" mask="url(#film-mask)" />
  <line x1="1070" y1="70" x2="1070" y2="250" stroke="#f0f6fc" stroke-width="1.5" opacity="0.12" mask="url(#film-mask)" />

  <!-- Sprocket Hole Inner Borders for Realism -->
  <!-- Top sprocket inner rects -->
  <rect x="945" y="80" width="12" height="16" rx="3" fill="none" stroke="#2f81f7" stroke-width="1.5" opacity="0.25" />
  <rect x="975" y="80" width="12" height="16" rx="3" fill="none" stroke="#2f81f7" stroke-width="1.5" opacity="0.25" />
  <rect x="1005" y="80" width="12" height="16" rx="3" fill="none" stroke="#f0f6fc" stroke-width="0.5" opacity="0.15" />
  <rect x="1035" y="80" width="12" height="16" rx="3" fill="none" stroke="#f0f6fc" stroke-width="0.5" opacity="0.15" />
  <rect x="1065" y="80" width="12" height="16" rx="3" fill="none" stroke="#3fb950" stroke-width="0.5" opacity="0.15" />
  <rect x="1095" y="80" width="12" height="16" rx="3" fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.25" />
  <rect x="1125" y="80" width="12" height="16" rx="3" fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.25" />
  <!-- Bottom sprocket inner rects -->
  <rect x="945" y="224" width="12" height="16" rx="3" fill="none" stroke="#2f81f7" stroke-width="1.5" opacity="0.25" />
  <rect x="975" y="224" width="12" height="16" rx="3" fill="none" stroke="#2f81f7" stroke-width="1.5" opacity="0.25" />
  <rect x="1005" y="224" width="12" height="16" rx="3" fill="none" stroke="#f0f6fc" stroke-width="0.5" opacity="0.15" />
  <rect x="1035" y="224" width="12" height="16" rx="3" fill="none" stroke="#f0f6fc" stroke-width="0.5" opacity="0.15" />
  <rect x="1065" y="224" width="12" height="16" rx="3" fill="none" stroke="#3fb950" stroke-width="0.5" opacity="0.15" />
  <rect x="1095" y="224" width="12" height="16" rx="3" fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.25" />
  <rect x="1125" y="224" width="12" height="16" rx="3" fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.25" />

  <!-- Icons inside Film Frames -->
  <!-- Frame 1: Video Play (Visual Accent Blue) -->
  <g mask="url(#film-mask)">
    <circle cx="967.5" cy="160" r="20" fill="none" stroke="#2f81f7" stroke-width="2" opacity="0.8" />
    <polygon points="963,151 977,160 963,169" fill="#2f81f7" opacity="0.9" />
  </g>

  <!-- Frame 2: Podcast Microphone (Neutral Light Accent) -->
  <g mask="url(#film-mask)">
    <rect x="1031.5" y="145" width="7" height="16" rx="3.5" fill="#f0f6fc" opacity="0.75" />
    <path d="M 1026.5,152.5 A 12,12 0 0 0 1043.5,152.5" fill="none" stroke="#f0f6fc" stroke-width="2" stroke-linecap="round" opacity="0.75" />
    <line x1="1035" y1="161" x2="1035" y2="169" stroke="#f0f6fc" stroke-width="2" stroke-linecap="round" opacity="0.75" />
    <line x1="1030" y1="169" x2="1040" y2="169" stroke="#f0f6fc" stroke-width="2" stroke-linecap="round" opacity="0.75" />
  </g>

  <!-- Frame 3: Audio Waveform (Visual Accent Green) -->
  <g mask="url(#film-mask)">
    <rect x="1091" y="154" width="4" height="12" rx="2" fill="#3fb950" opacity="0.8" />
    <rect x="1097" y="148" width="4" height="24" rx="2" fill="#3fb950" opacity="0.8" />
    <rect x="1103" y="142" width="4" height="36" rx="2" fill="#3fb950" opacity="0.8" />
    <rect x="1109" y="150" width="4" height="20" rx="2" fill="#3fb950" opacity="0.8" />
    <rect x="1115" y="155" width="4" height="10" rx="2" fill="#3fb950" opacity="0.8" />
  </g>

  <!-- Audio Waveform Bars (Left/Morphing Section) -->
  <!-- Waveform fading in from left -->
  <rect x="740" y="150" width="5" height="20" rx="2.5" fill="#2f81f7" opacity="0.4" />
  <rect x="752" y="142.5" width="5" height="35" rx="2.5" fill="#2f81f7" opacity="0.5" />
  <rect x="764" y="132.5" width="5" height="55" rx="2.5" fill="#2f81f7" opacity="0.65" />
  <rect x="776" y="115" width="5" height="90" rx="2.5" fill="#2f81f7" opacity="0.8" />
  
  <!-- Dynamic Gradient Bars -->
  <rect x="788" y="95" width="5" height="130" rx="2.5" fill="url(#grad-bar-blue-teal)" />
  <rect x="800" y="130" width="5" height="60" rx="2.5" fill="url(#grad-bar-blue-teal)" />
  <rect x="812" y="105" width="5" height="110" rx="2.5" fill="url(#grad-bar-blue-teal)" />
  <rect x="824" y="75" width="5" height="170" rx="2.5" fill="url(#grad-bar-teal)" />
  <rect x="836" y="120" width="5" height="80" rx="2.5" fill="url(#grad-bar-teal)" />
  
  <!-- Bars emerging out of the morphing ribbon -->
  <rect x="848" y="85" width="5" height="150" rx="2.5" fill="url(#grad-bar-teal-green)" />
  <rect x="860" y="55" width="5" height="210" rx="2.5" fill="url(#grad-bar-teal-green)" />
  <rect x="872" y="110" width="5" height="100" rx="2.5" fill="url(#grad-bar-green)" />
  <rect x="884" y="90" width="5" height="140" rx="2.5" fill="url(#grad-bar-green)" />
  <rect x="896" y="120" width="5" height="80" rx="2.5" fill="url(#grad-bar-green)" />
  <rect x="908" y="100" width="5" height="120" rx="2.5" fill="#3fb950" />
  <rect x="920" y="110" width="5" height="100" rx="2.5" fill="#3fb950" opacity="0.95" />

  <!-- AI Nodes / Connection Dots at peaks -->
  <circle cx="790.5" cy="95" r="3.5" fill="#2f81f7" filter="url(#glow-dot)" />
  <circle cx="826.5" cy="75" r="3.5" fill="#2ba8b4" filter="url(#glow-dot)" />
  <circle cx="862.5" cy="55" r="3.5" fill="#3fb950" filter="url(#glow-dot)" />
  <circle cx="886.5" cy="90" r="3.5" fill="#3fb950" filter="url(#glow-dot)" />

  <!-- LEFT COLUMN CONTENT: Title, Subtitle, Badges -->

  <!-- LOCAL Badge -->
  <rect x="80" y="70" width="76" height="22" rx="11" fill="none" stroke="#2f81f7" stroke-width="1.5" stroke-opacity="0.6" />
  <text x="118" y="85" class="mono-text" font-size="10" fill="#2f81f7" text-anchor="middle" letter-spacing="1">LOCAL</text>

  <!-- Big Title 'ai-media-editor' -->
  <text x="80" y="160" class="title-text" font-size="58" letter-spacing="-1.5">
    <tspan fill="url(#grad-title)">ai-</tspan><tspan fill="#f0f6fc">media-editor</tspan>
  </text>

  <!-- Subtitle -->
  <text x="80" y="210" class="body-text" font-size="19" fill="#8b949e" letter-spacing="-0.3">
    Video <tspan fill="#2f81f7">·</tspan> Audio <tspan fill="#3fb950">·</tspan> Podcast <tspan fill="#8b949e">— local, no cloud lock-in</tspan>
  </text>
</svg>
