name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  fast-checks:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install test tooling
        run: python -m pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Parse Python and JSON
        run: python -c "import ast,json,pathlib; [ast.parse(p.read_text(encoding='utf-8'), filename=str(p)) for p in pathlib.Path('.').rglob('*.py')]; json.loads(pathlib.Path('ellmos-module.v2.json').read_text(encoding='utf-8')); json.loads(pathlib.Path('config/settings.example.json').read_text(encoding='utf-8'))"
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: CLI smoke
        run: python editor.py modes
